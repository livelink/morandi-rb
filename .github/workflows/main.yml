name: CI build for the morandi-rb gem

on:
  push:
  pull_request:
    branches: [ master ]

jobs:
  build-dev:
    runs-on: ubuntu-latest
    name: ensures the dev environment image builds
    steps:
      - name: checkout repo
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      - name: build container
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          file: ./Dockerfile
          push: false
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      - name: lint code with rubocop
        uses: andrewmcodes/rubocop-linter-action@c9de2ff0e58217d3aa9167324b9dabdd2c6eefbe # v3.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  tests:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        ruby: ['2.7', '3.0', '3.1', '3.2', '3.3']
    name: install dependencies and run tests
    steps:
      - name: install image processing dependencies
        run: |
          sudo apt-get update \
          && sudo apt-get install -yqq \
             liblcms2-utils libglib2.0-dev libgtk2.0-dev libgdk-pixbuf2.0-dev imagemagick libvips
      - name: checkout repo
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      - name: unlock the gem versions
        run: rm Gemfile.lock
      - name: set up ruby environment
        uses: ruby/setup-ruby@b90be12699fdfcbee4440c2bba85f6f460446bb0 # v1.279.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: build the extension
        run: bundle exec rake compile
      - name: run the tests
        run: bundle exec rspec
        id: test
      - name: upload test artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: "visual-matching-results-ruby-${{ matrix.ruby}}"
          path: 'tmp/reference-image-matches'
          if-no-files-found: ignore
        if: success() || steps.test.conclusion == 'failure'
